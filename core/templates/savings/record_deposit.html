{% extends "base.html" %}

{% block title %}Record Deposit | Pamoja SACCO{% endblock %}

{% block content %}
<style>
    :root {
        --primary-blue: #2563eb;
        --success-green: #10b981;
        --bg-gray: #f9fafb;
        --text-dark: #1f2937;
        --border-color: #e5e7eb;
    }

    .deposit-wrapper {
        max-width: 550px;
        margin: 3rem auto;
        font-family: 'Inter', -apple-system, sans-serif;
    }

    .deposit-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        border: 1px solid var(--border-color);
    }

    .header-section {
        text-align: center;
        margin-bottom: 2rem;
    }

    .header-section h2 {
        color: var(--text-dark);
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        margin-bottom: 0.5rem;
    }

    .header-section p {
        color: #6b7280;
        font-size: 0.95rem;
    }

    /* Django Form Paragraph Styling */
    form p {
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
    }

    label {
        font-size: 0.875rem;
        font-weight: 600;
        color: #4b5563;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    /* Targeting the inputs generated by {{ form.as_p }} */
    input, select, textarea {
        width: 100%;
        padding: 0.875rem;
        border: 1.5px solid var(--border-color);
        border-radius: 8px;
        background-color: #fcfcfc;
        font-size: 1rem;
        transition: all 0.2s ease;
    }

    input:focus, select:focus {
        outline: none;
        border-color: var(--primary-blue);
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .btn-deposit {
        width: 100%;
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        color: white;
        padding: 1rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.1s ease, box-shadow 0.2s ease;
        margin-top: 1rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
    }

    .btn-deposit:hover {
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        transform: translateY(-1px);
    }

    .btn-deposit:active {
        transform: translateY(0);
    }

    /* Icon Placeholder - Simple CSS arrow */
    .icon-plus::before {
        content: '+';
        font-size: 1.2rem;
    }

    /* Error Styling */
    .errorlist {
        color: #dc2626;
        list-style: none;
        padding: 0;
        font-size: 0.85rem;
        margin-bottom: 1rem;
    }
</style>

<div class="deposit-wrapper">
    <div class="deposit-card">
        <div class="header-section">
            <h2>Record Deposit</h2>
            <p>Update member balances instantly.</p>
        </div>

        <form method="post" autocomplete="off">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="error-container">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <div class="form-fields">
                {{ form.as_p }}
            </div>

            <button class="btn-deposit" type="submit">
                <span class="icon-plus"></span> Complete Deposit
            </button>
        </form>
    </div>
</div>
{% endblock %}
